<!-- Analytics loader (consent-gated) + cookie consent banner -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  // GA is NOT loaded until the visitor accepts. Events fired before that
  // queue harmlessly in dataLayer and are only sent once analytics loads.
  window.fyfLoadAnalytics = function () {
    if (window.fyfGALoaded) return;
    window.fyfGALoaded = true;
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=G-PYRBFC16BM';
    document.head.appendChild(s);
    gtag('js', new Date());
    gtag('config', 'G-PYRBFC16BM');
  };
  // Honour a previously stored choice (no banner shown again).
  try {
    if (localStorage.getItem('fyf-consent') === 'granted') {
      window.fyfLoadAnalytics();
    }
  } catch (e) { /* localStorage unavailable — banner will handle it */ }
</script>

<!-- Cookie consent banner (shown by site.js only when no choice is stored) -->
<div id="cookie-banner" class="cookie-banner" role="dialog" aria-label="Cookie consent"
     aria-labelledby="cookie-banner-title" aria-describedby="cookie-banner-desc" hidden>
  <h2 id="cookie-banner-title" class="cookie-banner__title">We value your privacy</h2>
  <p id="cookie-banner-desc" class="cookie-banner__text">
    We use cookies to understand how our site is used and improve it. We do
    <strong>not</strong> use advertising cookies &ndash; nothing loads until you choose.
    See our <a href="/privacy.html">Privacy&nbsp;Policy</a>.
  </p>

  <!-- Customize panel: revealed when "Customize" is clicked -->
  <div class="cookie-options" id="cookie-options" hidden>
    <label class="cookie-option">
      <input type="checkbox" checked disabled>
      <span><strong>Strictly necessary</strong> &ndash; always on. Required for the site to work and to remember your choice.</span>
    </label>
    <label class="cookie-option">
      <input type="checkbox" id="consent-analytics">
      <span><strong>Analytics</strong> &ndash; Google Analytics, to measure how the site is used. Off by default.</span>
    </label>
  </div>

  <div class="cookie-banner__actions">
    <button type="button" class="btn btn--outline" id="consent-customize-btn" data-consent="customize">Customize</button>
    <button type="button" class="btn btn--outline" data-consent="reject">Reject All</button>
    <button type="button" class="btn btn--primary" data-consent="accept">Accept All</button>
    <button type="button" class="btn btn--primary" id="consent-save-btn" data-consent="save" hidden>Save preferences</button>
  </div>
</div>
